<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1020"/>
      <stop offset="100%" stop-color="#06070b"/>
    </linearGradient>
    <radialGradient id="glowRed" cx="14%" cy="10%" r="50%">
      <stop offset="0%" stop-color="#e62429" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#e62429" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="92%" cy="8%" r="45%">
      <stop offset="0%" stop-color="#7aa7ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7aa7ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowRed)"/>
  <rect width="1200" height="630" fill="url(#glowBlue)"/>

  <rect x="90" y="78" width="300" height="36" rx="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.16)"/>
  <circle cx="112" cy="96" r="5" fill="#e62429"/>
  <text x="128" y="101" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700"
