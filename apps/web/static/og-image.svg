  <line x1="1000" y1="150" x2="1000" y2="510" stroke="rgba(255,255,255,0.16)" stroke-width="3"/>
  <circle cx="1000" cy="150" r="14" fill="#111726" stroke="#ff5a5f" stroke-width="3"/>
  <circle cx="1000" cy="240" r="14" fill="#111726" stroke="#7aa7ff" stroke-width="3"/>
  <circle cx="1000" cy="330" r="14" fill="#111726" stroke="#ffd166" stroke-width="3"/>
  <circle cx="1000" cy="420" r="14" fill="#111726" stroke="#a783ff" stroke-width="3"/>
  <circle cx="1000" cy="510" r="14" fill="#111726" stroke="#ff5a5f" stroke-width="3"/>
